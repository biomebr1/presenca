<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biomë - Sistema Biométrico</title>
    <style>
        /* CSS Integrado para garantir que apareça */
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #ffffff; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { width: 100%; max-width: 340px; border: 2px solid #000; padding: 30px; box-sizing: border-box; text-align: center; background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .logo { width: 140px; margin-bottom: 25px; display: block; margin-left: auto; margin-right: auto; }
        
        #btnAuth { 
            width: 100%; padding: 18px; background: #000; color: #fff; border: none; 
            font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            transition: 0.3s;
        }
        #btnAuth:disabled { background: #f0f0f0; color: #aaa; cursor: wait; }

        #modalAuth {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 999; flex-direction: column; align-items: center; justify-content: center;
        }
        .camera-circle { width: 280px; height: 280px; border-radius: 50%; overflow: hidden; border: 3px solid #000; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #status { font-size: 10px; font-weight: bold; margin-top: 20px; text-transform: uppercase; letter-spacing: 2px; }

        #formFinal { display: none; text-align: left; margin-top: 20px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        label { font-size: 9px; font-weight: bold; text-transform: uppercase; display: block; margin-bottom: 5px; letter-spacing: 1px; }
        input { width: 100%; padding: 12px; border: 1px solid #eee; margin-bottom: 15px; box-sizing: border-box; font-weight: bold; font-size: 14px; outline: none; }
        #btnSend { width: 100%; padding: 18px; background: #000; color: #fff; border: none; font-weight: bold; cursor: pointer; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="box">
    <img src="https://static.wixstatic.com/media/91c4dc_49e4dd5b81744b3ca1719865d36d4363~mv2.png/v1/fill/w_154,h_60,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/biome%2020.png" class="logo" alt="Biomë">
    
    <button type="button" id="btnAuth" disabled>Sincronizando IA...</button>

    <div id="formFinal">
        <label>CPF Identificado</label>
        <input type="text" id="cpfIn" readonly>
        
        <label>Código Interno</label>
        <input type="text" id="codIn" placeholder="Digite seu código">

        <button id="btnSend">CONFIRMAR PRESENÇA</button>
    </div>
</div>

<div id="modalAuth">
    <div class="camera-circle"><video id="video" autoplay playsinline muted></video></div>
    <div id="status">Aguardando Reconhecimento...</div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>
    (function(){ emailjs.init("zM58bekmRlBuBZsGD"); })();

    const btnAuth = document.getElementById('btnAuth');
    const modal = document.getElementById('modalAuth');
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const cpfIn = document.getElementById('cpfIn');
    let faceMatcher = null;
    let fotoBase64 = "";
    let userIP = "Buscando...";

    // CPFs das fotos que você subiu
    const dbCPFs = ["13192978970", "07807443901", "07114646933", "13778936930"];

    // Busca IP
    fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => userIP = d.ip);

    async function iniciarSistema() {
        try {
            // Modelos da IA hospedados no GitHub oficial do criador
            const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);

            const labeledDescriptors = await Promise.all(dbCPFs.map(async cpf => {
                const img = await faceapi.fetchImage(cpf + '.jpg');
                const det = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
                return new faceapi.LabeledFaceDescriptors(cpf, [det.descriptor]);
            }));

            faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6);
            btnAuth.innerText = "INICIAR BIOMETRIA";
            btnAuth.disabled = false;
        } catch (e) {
            btnAuth.innerText = "ERRO DE CARREGAMENTO";
            console.error("Erro IA:", e);
        }
    }

    btnAuth.onclick = async () => {
        modal.style.display = 'flex';
        const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
        video.srcObject = stream;

        const loop = setInterval(async () => {
            const det = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            if (det) {
                const match = faceMatcher.findBestMatch(det.descriptor);
                if (match.label !== 'unknown') {
                    clearInterval(loop);
                    
                    const canvas = document.getElementById('canvas');
                    canvas.width = 320; canvas.height = 320;
                    canvas.getContext('2d').drawImage(video, 0, 0, 320, 320);
                    fotoBase64 = canvas.toDataURL('image/jpeg', 0.5);

                    cpfIn.value = match.label.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
                    modal.style.display = 'none';
                    document.getElementById('formFinal').style.display = 'block';
                    btnAuth.style.display = 'none';
                    stream.getTracks().forEach(t => t.stop());
                }
            }
        }, 1000);
    };

    document.getElementById('btnSend').onclick = function() {
        this.innerText = "ENVIANDO...";
        const agora = new Date().toLocaleString("pt-BR", {weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'});
        
        emailjs.send("registrodepresencabiome", "template_biomevalida", {
            cpf_user: cpfIn.value,
            codigo_validacao: document.getElementById('codIn').value,
            horario_registro: agora,
            ip_address: userIP,
            foto_facial: fotoBase64
        }).then(() => { 
            alert("Presença Registrada!"); 
            location.reload(); 
        });
    };

    iniciarSistema();
</script>
</body>
</html>
